<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雪の画廊</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#e8edec;--bg2:#f4f6f5;--bgc:#f0f4f3;--bgh:#e5ecea;
--mt:#8aa8a0;--mb:#94a7b0;--mg:#a3b5a6;--mm:#c2d1cc;--mf:#d0dbd7;--md:#6b8f86;--mk:#5a7a72;
--tp:#3d4f4a;--ts:#6b7f78;--tm:#8a9e96;
--bd:#c8d5d0;--shh:rgba(106,143,134,.15);
--tbg:rgba(138,168,160,.15);--ttx:#5a7a72;--ov:rgba(61,79,74,.6)
}
body{font-family:'Zen Kaku Gothic New','Noto Serif JP',sans-serif;background:var(--bg);color:var(--tp);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(600px at 10% 20%,rgba(138,168,160,.12),transparent),radial-gradient(500px at 85% 70%,rgba(148,167,176,.1),transparent);pointer-events:none;z-index:0}
header{position:relative;z-index:1;text-align:center;padding:42px 20px 14px}
header h1{font-family:'Noto Serif JP',serif;font-weight:300;font-size:2.2rem;letter-spacing:.15em;background:linear-gradient(135deg,var(--md),var(--mb));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header .sub{font-weight:300;font-size:.82rem;color:var(--tm);letter-spacing:.25em;margin-top:3px}
.hl{width:50px;height:1.5px;background:linear-gradient(90deg,transparent,var(--mt),transparent);margin:12px auto 0}

/* Admin bar */
.admin-bar{position:relative;z-index:3;text-align:center;padding:8px 20px}
.admin-bar button{padding:6px 16px;border-radius:16px;border:1px solid var(--bd);background:var(--bg2);font-family:inherit;font-size:.78rem;color:var(--ts);cursor:pointer;transition:all .3s}
.admin-bar button:hover{border-color:var(--mt);color:var(--mk)}
.admin-bar button.logged{background:var(--mt);color:#fff;border-color:var(--mt)}
.admin-bar .status{font-size:.74rem;color:var(--tm);margin-left:6px}

.nav{position:relative;z-index:2;display:flex;justify-content:center;gap:6px;padding:12px 20px 16px;flex-wrap:wrap}
.nb{padding:8px 22px;border-radius:22px;border:1px solid var(--bd);background:var(--bg2);font-family:inherit;font-size:.84rem;color:var(--ts);cursor:pointer;transition:all .3s}
.nb:hover{border-color:var(--mt);color:var(--mk)}
.nb.on{background:linear-gradient(135deg,var(--mt),var(--md));color:#fff;border-color:transparent;box-shadow:0 2px 12px rgba(106,143,134,.25)}
.sec{position:relative;z-index:1;max-width:1260px;margin:0 auto;padding:0 20px 50px;display:none}
.sec.on{display:block}
.ctrl{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.srch{flex:1;min-width:160px;max-width:320px;position:relative}
.srch input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--bd);border-radius:9px;background:var(--bg2);font-family:inherit;font-size:.84rem;color:var(--tp);outline:none;transition:border .3s,box-shadow .3s}
.srch input:focus{border-color:var(--mt);box-shadow:0 0 0 3px rgba(138,168,160,.12)}
.srch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tm);width:14px;height:14px}
.ft{display:flex;gap:5px;flex-wrap:wrap}
.ftg{padding:5px 12px;border-radius:16px;border:1px solid var(--bd);background:var(--bg2);font-size:.78rem;color:var(--ts);cursor:pointer;transition:all .3s;user-select:none}
.ftg:hover,.ftg.on{background:var(--mt);color:#fff;border-color:var(--mt)}
.ba{padding:8px 16px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--mt),var(--md));color:#fff;font-family:inherit;font-size:.83rem;cursor:pointer;transition:all .3s;box-shadow:0 2px 8px rgba(106,143,134,.2);white-space:nowrap}
.ba:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(106,143,134,.3)}
.spacer{flex:1}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}

/* Card */
.cd{background:var(--bgc);border:1px solid var(--bd);border-radius:12px;transition:all .35s cubic-bezier(.4,0,.2,1);cursor:pointer;position:relative;overflow:hidden;display:flex;flex-direction:column}
.cd::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--mt),var(--mb),var(--mg));opacity:0;transition:opacity .3s}
.cd:hover{transform:translateY(-3px);box-shadow:0 8px 26px var(--shh);border-color:var(--mm);background:var(--bgh)}
.cd:hover::before{opacity:1}
.cd-img{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--mf);display:block}
.cd-ph{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,var(--mf),var(--mm));display:flex;align-items:center;justify-content:center;color:var(--tm);font-size:.84rem}
.cd-b{padding:16px;flex:1;display:flex;flex-direction:column}
.cd-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cd-t{font-family:'Noto Serif JP',serif;font-weight:500;font-size:.98rem;color:var(--mk);line-height:1.5}
.cd-n{font-size:.7rem;color:var(--tm);background:var(--tbg);padding:2px 8px;border-radius:9px;white-space:nowrap}
.cd-d{font-size:.81rem;color:var(--ts);line-height:1.7;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
.cd-tg{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.cd-tgi{font-size:.71rem;padding:2px 8px;border-radius:10px;background:var(--tbg);color:var(--ttx)}
.cd-m{display:flex;justify-content:space-between;align-items:center;font-size:.73rem;color:var(--tm);border-top:1px solid var(--bd);padding-top:9px;margin-top:auto}
.cd-a{display:flex;gap:4px}
.cd-a button{background:none;border:none;color:var(--tm);cursor:pointer;padding:3px;border-radius:5px;transition:all .2s}
.cd-a button:hover{color:var(--md);background:var(--tbg)}
.ic{width:14px;height:14px}

/* Artist images */
.ai-r{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:10px}
.ai-r img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px;background:var(--mf)}
.ai-r .ph{width:100%;aspect-ratio:1;background:var(--mf);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--tm)}
.mbdg{display:inline-block;font-size:.68rem;padding:2px 7px;border-radius:7px;margin:0 3px 3px 0}
.mb0{background:rgba(138,168,160,.2);color:var(--mk)}.mb1{background:rgba(148,167,176,.2);color:#5a6f7a}.mb2{background:rgba(181,163,166,.2);color:#7a5a5f}.mb3{background:rgba(166,163,181,.2);color:#5f5a7a}

/* Clothing */
.cl-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.cl-cat{padding:8px 18px;border-radius:20px;border:1px solid var(--bd);background:var(--bg2);font-size:.84rem;color:var(--ts);cursor:pointer;transition:all .3s;user-select:none;display:flex;align-items:center;gap:5px}
.cl-cat:hover{border-color:var(--mt);color:var(--mk)}
.cl-cat.on{background:var(--mt);color:#fff;border-color:var(--mt)}
.cl-cat .cnt{font-size:.7rem;opacity:.7}
.cp-bar{background:var(--bgc);border:1px solid var(--bd);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:none}
.cp-bar.show{display:block}
.cp-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.cp-info{font-size:.84rem;color:var(--ts)}.cp-info strong{color:var(--mk)}
.cp-acts{display:flex;gap:6px;flex-wrap:wrap}
.cp-btn{padding:7px 18px;border-radius:8px;border:none;font-family:inherit;font-size:.82rem;cursor:pointer;transition:all .3s}
.cp-copy{background:linear-gradient(135deg,var(--mt),var(--md));color:#fff;box-shadow:0 2px 8px rgba(106,143,134,.2)}
.cp-copy:hover{box-shadow:0 4px 16px rgba(106,143,134,.3)}
.cp-clear{background:var(--bg2);color:var(--ts);border:1px solid var(--bd)}
.cp-clear:hover{background:var(--bd)}
.cp-all{background:transparent;color:var(--md);border:1px solid var(--mt)}
.cp-all:hover{background:rgba(138,168,160,.1)}
.cp-preview{font-size:.8rem;color:var(--ts);line-height:1.6;word-break:break-all;max-height:60px;overflow-y:auto;background:var(--bg);border-radius:7px;padding:8px 10px;border:1px solid var(--bd)}
.cl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.cl-it{background:var(--bgc);border:1px solid var(--bd);border-radius:10px;padding:10px;text-align:center;transition:all .3s;cursor:pointer;position:relative}
.cl-it:hover{transform:translateY(-2px);box-shadow:0 4px 14px var(--shh);border-color:var(--mm)}
.cl-it.sel{border-color:var(--mt);background:rgba(138,168,160,.1);box-shadow:0 0 0 2px rgba(138,168,160,.2)}
.cl-it img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;background:var(--mf);margin-bottom:6px}
.cl-it .iph{width:100%;aspect-ratio:1;border-radius:6px;background:linear-gradient(135deg,var(--mf),var(--mm));display:flex;align-items:center;justify-content:center;color:var(--tm);font-size:1.5rem;margin-bottom:6px}
.cl-it .nm{font-size:.83rem;color:var(--tp);font-weight:500}
.cl-it .en{font-size:.72rem;color:var(--tm)}
.cl-it .pr{font-size:.7rem;color:var(--mt);margin-top:3px;font-style:italic;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.cl-it .ck{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;border:2px solid var(--bd);background:var(--bg2);display:flex;align-items:center;justify-content:center;transition:all .25s}
.cl-it.sel .ck{background:var(--mt);border-color:var(--mt)}
.cl-it.sel .ck::after{content:'✓';color:#fff;font-size:.7rem}
.cl-it .acts{position:absolute;top:6px;left:6px;display:flex;gap:3px;opacity:0;transition:opacity .2s}
.cl-it:hover .acts{opacity:1}
.cl-it .acts button{width:22px;height:22px;border-radius:50%;border:none;background:rgba(0,0,0,.25);color:#fff;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.cl-it .acts button:hover{background:rgba(0,0,0,.45)}

/* Modal */
.mo{display:none;position:fixed;inset:0;background:var(--ov);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.mo.show{display:flex}
.mbox{background:var(--bg2);border-radius:14px;padding:26px;width:92%;max-width:540px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:mi .3s ease}
@keyframes mi{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.mbox h2{font-family:'Noto Serif JP',serif;font-weight:400;font-size:1.08rem;color:var(--mk);margin-bottom:18px;letter-spacing:.05em}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:.77rem;color:var(--ts);margin-bottom:4px}
.fg input,.fg textarea,.fg select{width:100%;padding:8px 11px;border:1px solid var(--bd);border-radius:8px;background:var(--bg);font-family:inherit;font-size:.84rem;color:var(--tp);outline:none;transition:border .3s}
.fg input:focus,.fg textarea:focus{border-color:var(--mt)}
.fg textarea{min-height:80px;resize:vertical;line-height:1.7}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mbt{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.mbt button{padding:8px 20px;border-radius:8px;border:none;font-family:inherit;font-size:.84rem;cursor:pointer;transition:all .3s}
.bc{background:var(--bg);color:var(--ts);border:1px solid var(--bd)!important}.bc:hover{background:var(--bd)}
.bs{background:linear-gradient(135deg,var(--mt),var(--md));color:#fff}.bs:hover{box-shadow:0 4px 16px rgba(106,143,134,.3)}
.dp{background:var(--bg);border-radius:8px;padding:12px;font-size:.84rem;line-height:1.8;color:var(--tp);margin:8px 0;word-break:break-all;white-space:pre-wrap;border:1px solid var(--bd)}
.cpb{padding:7px 15px;border-radius:7px;border:1px solid var(--mt);background:transparent;color:var(--md);font-family:inherit;font-size:.8rem;cursor:pointer;transition:all .3s}
.cpb:hover{background:var(--mt);color:#fff}
.di{font-size:.77rem;color:var(--tm);margin:4px 0}
.ad-imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin:10px 0}
.ad-imgs img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;background:var(--mf);cursor:pointer;transition:transform .3s}
.ad-imgs img:hover{transform:scale(1.03)}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(6px)}
.lb.show{display:flex}
.lb img{max-width:90%;max-height:90%;object-fit:contain;border-radius:8px}
.empty{grid-column:1/-1;text-align:center;padding:45px 20px;color:var(--tm)}
.loading{text-align:center;padding:40px;color:var(--tm);font-size:.9rem}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--mk);color:#fff;padding:9px 26px;border-radius:10px;font-size:.84rem;opacity:0;transition:all .35s;z-index:300;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:640px){
  header h1{font-size:1.7rem}.grid{grid-template-columns:1fr}.sec{padding:0 12px 40px}.mbox{padding:20px;width:96%}.fr{grid-template-columns:1fr}.cl-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--mm);border-radius:3px}
</style>
</head>
<body>
<header><h1>雪の画廊</h1><p class="sub">PIXAI PROMPT COLLECTION</p><div class="hl"></div></header>

<div class="admin-bar" id="adminBar">
  <button id="adminBtn" onclick="toggleAdmin()">🔒 管理员登录</button>
  <span class="status" id="adminStatus"></span>
</div>

<nav class="nav">
  <button class="nb on" onclick="sw('prompts')">✦ Prompt 收藏</button>
  <button class="nb" onclick="sw('artists')">✦ 画师串</button>
  <button class="nb" onclick="sw('clothing')">✦ 服装图鉴</button>
</nav>

<div class="sec on" id="s-prompts">
  <div class="ctrl">
    <div class="srch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input id="pS" placeholder="搜索 prompt ..."></div>
    <div class="ft" id="pF"></div>
    <div class="spacer"></div>
    <button class="ba" id="pAdd" onclick="oM('p')" style="display:none">+ 新增</button>
  </div>
  <div class="grid" id="pG"><div class="loading">加载中...</div></div>
</div>

<div class="sec" id="s-artists">
  <div class="ctrl">
    <div class="srch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input id="aS" placeholder="搜索画师 ..."></div>
    <div class="ft" id="aF"></div>
    <div class="spacer"></div>
    <button class="ba" id="aAdd" onclick="oM('a')" style="display:none">+ 新增画师</button>
  </div>
  <div class="grid" id="aG"><div class="loading">加载中...</div></div>
</div>

<div class="sec" id="s-clothing">
  <div class="ctrl" id="clCtrl">
    <div class="srch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input id="cS" placeholder="搜索服装 ..."></div>
    <div class="spacer"></div>
    <button class="ba" id="ciAdd" onclick="oM('ci')" style="display:none">+ 新增单品</button>
    <button class="ba" id="ccAdd" onclick="oM('cc')" style="display:none;background:linear-gradient(135deg,var(--mb),#7a8fa0)">+ 新增分类</button>
  </div>
  <div class="cl-cats" id="cCats"></div>
  <div id="cpBar" class="cp-bar"></div>
  <div class="cl-grid" id="cG"><div class="loading">加载中...</div></div>
</div>

<div class="mo" id="uMo"><div class="mbox" id="uMb"></div></div>
<div class="mo" id="dMo"><div class="mbox" id="dMb"></div></div>
<div class="lb" id="lb" onclick="this.classList.remove('show')"><img id="lbi"></div>
<div class="toast" id="toast"></div>

<script>
// ===== SUPABASE CONFIG =====
const SB_URL='https://xvlxytmmmmqbaiffehma.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2bHh5dG1tbW1xYmFpZmZlaG1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDQ1ODcsImV4cCI6MjA4OTU4MDU4N30.WxG-1DZfLq4thtV3dwxFeEINrBw5U8TWg3OgWi00E3c';
const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

async function sb(path,opt={}){
  const r=await fetch(SB_URL+'/rest/v1/'+path,{headers:H,...opt});
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();
  return t?JSON.parse(t):null;
}

// ===== STATE =====
let D={p:[],a:[],cats:[],items:[]};
let S={tab:'prompts',admin:false,pF:null,aF:null,cF:null,sel:new Set(),et:null,eid:null};
const isAdmin=()=>S.admin;

// ===== DATA LOADING =====
async function loadAll(){
  try{
    const [p,a,cats,items]=await Promise.all([
      sb('prompts?order=created_at.desc'),
      sb('artists?order=created_at.desc'),
      sb('clothing_cats?order=sort_order.asc'),
      sb('clothing_items?order=created_at.asc')
    ]);
    D.p=p||[];D.a=a||[];D.cats=cats||[];D.items=items||[];
  }catch(e){console.error(e);toast('数据加载失败')}
  R();
}

// ===== ADMIN =====
function toggleAdmin(){
  if(S.admin){
    S.admin=false;
    sessionStorage.removeItem('yg_admin');
    updAdmin();R();return;
  }
  const pw=prompt('请输入管理员密码：');
  if(!pw)return;
  sb('admin_config?id=eq.1&select=password_hash').then(d=>{
    if(d&&d[0]&&d[0].password_hash===pw){
      S.admin=true;sessionStorage.setItem('yg_admin','1');
      toast('管理员登录成功');updAdmin();R();
    }else{toast('密码错误');S.admin=false}
  }).catch(()=>toast('验证失败'));
}
function updAdmin(){
  const btn=document.getElementById('adminBtn');
  const st=document.getElementById('adminStatus');
  if(S.admin){btn.textContent='🔓 退出管理';btn.className='logged';st.textContent='管理模式'}
  else{btn.textContent='🔒 管理员登录';btn.className='';st.textContent=''}
  document.querySelectorAll('#pAdd,#aAdd,#ciAdd,#ccAdd').forEach(b=>b.style.display=S.admin?'':'none');
}

// ===== UTILS =====
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
function cpx(t){navigator.clipboard.writeText(t);toast('已复制到剪贴板 ✓')}
function slb(u){document.getElementById('lbi').src=u;document.getElementById('lb').classList.add('show')}
const svgCp='<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
const svgEd='<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
const svgDl='<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>';

// ===== TAB =====
function sw(t){S.tab=t;document.querySelectorAll('.nb').forEach((b,i)=>b.classList.toggle('on',['prompts','artists','clothing'][i]===t));document.querySelectorAll('.sec').forEach(s=>s.classList.toggle('on',s.id==='s-'+t));R()}

// ===== RENDER =====
function R(){if(S.tab==='prompts')rP();else if(S.tab==='artists')rA();else rC()}
function gT(a){const s=new Set();a.forEach(i=>(i.tags||[]).forEach(t=>s.add(t)));return[...s]}
function adminActs(cpCmd,edCmd,dlCmd){
  if(!isAdmin())return`<button onclick="event.stopPropagation();${cpCmd}" title="复制">${svgCp}</button>`;
  return`<button onclick="event.stopPropagation();${cpCmd}" title="复制">${svgCp}</button><button onclick="event.stopPropagation();${edCmd}" title="编辑">${svgEd}</button><button onclick="event.stopPropagation();${dlCmd}" title="删除">${svgDl}</button>`;
}

// -- Prompts --
function rP(){
  const tags=gT(D.p);
  document.getElementById('pF').innerHTML=tags.map(t=>`<span class="ftg${S.pF===t?' on':''}" onclick="S.pF=S.pF==='${esc(t)}'?null:'${esc(t)}';R()">${esc(t)}</span>`).join('');
  let l=D.p,q=document.getElementById('pS').value.toLowerCase();
  if(q)l=l.filter(p=>p.title.toLowerCase().includes(q)||p.prompt.toLowerCase().includes(q)||(p.tags||[]).some(t=>t.includes(q)));
  if(S.pF)l=l.filter(p=>(p.tags||[]).includes(S.pF));
  const g=document.getElementById('pG');
  if(!l.length){g.innerHTML='<div class="empty"><p>暂无 prompt</p></div>';return}
  g.innerHTML=l.map((p,i)=>`<div class="cd" onclick="dP(${p.id})">
    ${p.img?`<img class="cd-img" src="${esc(p.img)}" onerror="this.outerHTML='<div class=cd-ph>📷</div>'">`:'<div class="cd-ph">📷</div>'}
    <div class="cd-b"><div class="cd-h"><div class="cd-t">${esc(p.title)}</div><div class="cd-n">#${String(i+1).padStart(3,'0')}</div></div>
    <div class="cd-d">${esc(p.prompt)}</div>
    <div class="cd-tg">${(p.tags||[]).map(t=>`<span class="cd-tgi">${esc(t)}</span>`).join('')}</div>
    <div class="cd-m"><span>${esc(p.model||'')}</span><div class="cd-a">${adminActs(`cpx(${JSON.stringify(p.prompt)})`,`oM('p',${p.id})`,`dl('prompts',${p.id})`)}</div></div></div></div>`).join('');
}

// -- Artists --
function rA(){
  const tags=gT(D.a);
  document.getElementById('aF').innerHTML=tags.map(t=>`<span class="ftg${S.aF===t?' on':''}" onclick="S.aF=S.aF==='${esc(t)}'?null:'${esc(t)}';R()">${esc(t)}</span>`).join('');
  let l=D.a,q=document.getElementById('aS').value.toLowerCase();
  if(q)l=l.filter(a=>a.name.toLowerCase().includes(q)||a.string.toLowerCase().includes(q)||(a.tags||[]).some(t=>t.includes(q)));
  if(S.aF)l=l.filter(a=>(a.tags||[]).includes(S.aF));
  const g=document.getElementById('aG');
  if(!l.length){g.innerHTML='<div class="empty"><p>暂无画师串</p></div>';return}
  const mc=['mb0','mb1','mb2','mb3'];
  g.innerHTML=l.map(a=>{
    const imgs=a.images||[];
    const ih=imgs.length?imgs.slice(0,3).map(u=>`<img src="${esc(u)}" onerror="this.outerHTML='<div class=ph>×</div>'">`).join(''):'<div class="ph">暂无</div><div class="ph"></div><div class="ph"></div>';
    return`<div class="cd" onclick="dA(${a.id})"><div class="cd-b">
      <div class="cd-h"><div class="cd-t">${esc(a.name)}</div></div>
      <div class="ai-r">${ih}</div>
      <div class="cd-d">${esc(a.string)}</div>
      <div style="margin-bottom:6px">${(a.models||[]).map((m,i)=>`<span class="mbdg ${mc[i%4]}">${esc(m.name)}</span>`).join('')}</div>
      <div class="cd-tg">${(a.tags||[]).map(t=>`<span class="cd-tgi">${esc(t)}</span>`).join('')}</div>
      <div class="cd-m"><span>${(a.created_at||'').slice(0,10)}</span><div class="cd-a">${adminActs(`cpx(${JSON.stringify(a.string)})`,`oM('a',${a.id})`,`dl('artists',${a.id})`)}</div></div></div></div>`}).join('');
}

// -- Clothing --
function rC(){
  const cats=D.cats,items=D.items;
  document.getElementById('cCats').innerHTML=cats.map(c=>{
    const cnt=items.filter(i=>i.cat===c.id).length;
    return`<div class="cl-cat${S.cF===c.id?' on':''}" onclick="S.cF=S.cF==='${c.id}'?null:'${c.id}';rC()">${c.icon} ${esc(c.name)} <span class="cnt">${cnt}</span></div>`;
  }).join('');
  let fl=items;
  if(S.cF)fl=fl.filter(i=>i.cat===S.cF);
  const q=document.getElementById('cS').value.toLowerCase();
  if(q)fl=fl.filter(i=>(i.name||'').toLowerCase().includes(q)||(i.en||'').toLowerCase().includes(q)||(i.prompt||'').toLowerCase().includes(q));
  const selItems=items.filter(i=>S.sel.has(i.id));
  const bar=document.getElementById('cpBar');
  if(selItems.length){
    const combined=[...new Set(selItems.map(i=>i.prompt).filter(Boolean).join(', ').split(/,\s*/).filter(Boolean))].join(', ');
    bar.className='cp-bar show';
    bar.innerHTML=`<div class="cp-top"><div class="cp-info">已选择 <strong>${selItems.length}</strong> 件 · ${selItems.map(i=>i.name).join('、')}</div>
      <div class="cp-acts"><button class="cp-btn cp-all" onclick="selAll()">全选当前</button><button class="cp-btn cp-clear" onclick="S.sel.clear();rC()">清除</button>
      <button class="cp-btn cp-copy" onclick="cpx(\`${combined.replace(/`/g,'\\`')}\`)">📋 一键复制 Prompt</button></div></div>
      <div class="cp-preview">${esc(combined)}</div>`;
  }else{bar.className='cp-bar';bar.innerHTML=''}
  const g=document.getElementById('cG');
  if(!fl.length){g.innerHTML='<div class="empty"><p>无匹配单品</p></div>';return}
  g.innerHTML=fl.map(i=>{
    const sel=S.sel.has(i.id);
    const adm=isAdmin()?`<div class="acts"><button onclick="event.stopPropagation();oM('cie',${i.id})" title="编辑">✎</button><button onclick="event.stopPropagation();dlCI(${i.id})" title="删除">×</button></div>`:'';
    return`<div class="cl-it${sel?' sel':''}" onclick="tgSel(${i.id})">
      <div class="ck"></div>${adm}
      ${i.img?`<img src="${esc(i.img)}" onerror="this.outerHTML='<div class=iph>👘</div>'">`:'<div class="iph">👘</div>'}
      <div class="nm">${esc(i.name)}</div><div class="en">${esc(i.en||'')}</div><div class="pr">${esc(i.prompt)}</div>
    </div>`}).join('');
}
function tgSel(id){if(S.sel.has(id))S.sel.delete(id);else S.sel.add(id);rC()}
function selAll(){
  let fl=D.items;
  if(S.cF)fl=fl.filter(i=>i.cat===S.cF);
  const q=document.getElementById('cS').value.toLowerCase();
  if(q)fl=fl.filter(i=>(i.name||'').toLowerCase().includes(q)||(i.en||'').toLowerCase().includes(q)||(i.prompt||'').toLowerCase().includes(q));
  fl.forEach(i=>S.sel.add(i.id));rC();
}

// ===== MODALS =====
function oMo(id){document.getElementById(id).classList.add('show')}
function cMo(id){document.getElementById(id).classList.remove('show')}
document.getElementById('uMo').addEventListener('click',e=>{if(e.target.classList.contains('mo'))cMo('uMo')});
document.getElementById('dMo').addEventListener('click',e=>{if(e.target.classList.contains('mo'))cMo('dMo')});

function oM(type,eid){
  if(!isAdmin()){toast('请先登录管理员');return}
  S.et=type;S.eid=eid||null;
  const b=document.getElementById('uMb');
  if(type==='p'){
    const p=eid?D.p.find(i=>i.id===eid):null;
    b.innerHTML=`<h2>${p?'✎ 编辑':'✦ 新增'} Prompt</h2>
      <div class="fg"><label>标题</label><input id="f_t" value="${esc(p?.title||'')}"></div>
      <div class="fg"><label>Prompt</label><textarea id="f_p">${esc(p?.prompt||'')}</textarea></div>
      <div class="fg"><label>Negative Prompt</label><textarea id="f_n" style="min-height:50px">${esc(p?.negative||'')}</textarea></div>
      <div class="fr"><div class="fg"><label>标签（逗号分隔）</label><input id="f_tg" value="${esc((p?.tags||[]).join(', '))}"></div>
      <div class="fg"><label>模型 / 参数</label><input id="f_m" value="${esc(p?.model||'')}"></div></div>
      <div class="fg"><label>封面图 URL</label><input id="f_img" value="${esc(p?.img||'')}"></div>
      <div class="mbt"><button class="bc" onclick="cMo('uMo')">取消</button><button class="bs" onclick="sF()">保存</button></div>`;
  }else if(type==='a'){
    const a=eid?D.a.find(i=>i.id===eid):null;
    const ms=a?.models?.length?a.models:[{name:'',notes:''}];
    b.innerHTML=`<h2>${a?'✎ 编辑':'✦ 新增'}画师串</h2>
      <div class="fg"><label>名称</label><input id="f_nm" value="${esc(a?.name||'')}"></div>
      <div class="fg"><label>画师串</label><textarea id="f_st">${esc(a?.string||'')}</textarea></div>
      <div class="fg"><label>标签</label><input id="f_tg" value="${esc((a?.tags||[]).join(', '))}"></div>
      <div class="fg"><label>展示图 URL（每行一个）</label><textarea id="f_im" style="min-height:50px">${(a?.images||[]).join('\n')}</textarea></div>
      <div id="mFs">${ms.map((m,i)=>`<div class="fr" style="margin-bottom:6px"><div class="fg" style="margin:0"><label>模型${i+1}</label><input class="mfn" value="${esc(m.name)}"></div><div class="fg" style="margin:0"><label>备注</label><input class="mfo" value="${esc(m.notes)}"></div></div>`).join('')}</div>
      <button onclick="addMF()" style="font-size:.76rem;color:var(--md);background:none;border:none;cursor:pointer;margin-bottom:12px">+ 添加模型</button>
      <div class="mbt"><button class="bc" onclick="cMo('uMo')">取消</button><button class="bs" onclick="sF()">保存</button></div>`;
  }else if(type==='ci'||type==='cie'){
    const it=type==='cie'&&eid?D.items.find(i=>i.id===eid):null;
    b.innerHTML=`<h2>${it?'✎ 编辑':'✦ 新增'}服装单品</h2>
      <div class="fr"><div class="fg"><label>名称</label><input id="f_cin" value="${esc(it?.name||'')}"></div>
      <div class="fg"><label>英文名</label><input id="f_cie" value="${esc(it?.en||'')}"></div></div>
      <div class="fg"><label>Prompt Tag</label><input id="f_cip" value="${esc(it?.prompt||'')}"></div>
      <div class="fg"><label>所属分类</label><select id="f_cic">${D.cats.map(c=>`<option value="${c.id}"${it?.cat===c.id?' selected':''}>${c.icon} ${esc(c.name)}</option>`).join('')}</select></div>
      <div class="fg"><label>图片 URL</label><input id="f_cii" value="${esc(it?.img||'')}"></div>
      <div class="mbt"><button class="bc" onclick="cMo('uMo')">取消</button><button class="bs" onclick="sF()">保存</button></div>`;
  }else if(type==='cc'){
    b.innerHTML=`<h2>✦ 新增分类</h2>
      <div class="fr"><div class="fg"><label>分类名称</label><input id="f_cn"></div><div class="fg"><label>图标 Emoji</label><input id="f_ci2" maxlength="4"></div></div>
      <div class="fg"><label>分类 ID（英文）</label><input id="f_cid" placeholder="如 shoes"></div>
      <div class="mbt"><button class="bc" onclick="cMo('uMo')">取消</button><button class="bs" onclick="sF()">保存</button></div>`;
  }
  oMo('uMo');
}
function addMF(){const c=document.getElementById('mFs'),n=c.querySelectorAll('.mfn').length;c.insertAdjacentHTML('beforeend',`<div class="fr" style="margin-bottom:6px"><div class="fg" style="margin:0"><label>模型${n+1}</label><input class="mfn"></div><div class="fg" style="margin:0"><label>备注</label><input class="mfo"></div></div>`)}

async function sF(){
  const t=S.et;
  try{
    if(t==='p'){
      const title=document.getElementById('f_t').value.trim(),prompt=document.getElementById('f_p').value.trim();
      if(!title||!prompt){alert('请填写标题和 Prompt');return}
      const o={title,prompt,negative:document.getElementById('f_n').value.trim(),tags:document.getElementById('f_tg').value.split(/[,，]/).map(s=>s.trim()).filter(Boolean),model:document.getElementById('f_m').value.trim(),img:document.getElementById('f_img').value.trim()};
      if(S.eid)await sb('prompts?id=eq.'+S.eid,{method:'PATCH',body:JSON.stringify(o)});
      else await sb('prompts',{method:'POST',body:JSON.stringify(o)});
    }else if(t==='a'){
      const name=document.getElementById('f_nm').value.trim(),str=document.getElementById('f_st').value.trim();
      if(!name||!str){alert('请填写名称和画师串');return}
      const ns=document.querySelectorAll('.mfn'),os=document.querySelectorAll('.mfo'),models=[];
      for(let i=0;i<ns.length;i++){const n=ns[i].value.trim();if(n)models.push({name:n,notes:os[i]?.value.trim()||''})}
      const o={name,string:str,tags:document.getElementById('f_tg').value.split(/[,，]/).map(s=>s.trim()).filter(Boolean),models,images:document.getElementById('f_im').value.split('\n').map(s=>s.trim()).filter(Boolean)};
      if(S.eid)await sb('artists?id=eq.'+S.eid,{method:'PATCH',body:JSON.stringify(o)});
      else await sb('artists',{method:'POST',body:JSON.stringify(o)});
    }else if(t==='ci'||t==='cie'){
      const name=document.getElementById('f_cin').value.trim();
      if(!name){alert('请填写名称');return}
      const o={name,en:document.getElementById('f_cie').value.trim(),prompt:document.getElementById('f_cip').value.trim(),cat:document.getElementById('f_cic').value,img:document.getElementById('f_cii').value.trim()};
      if(t==='cie'&&S.eid)await sb('clothing_items?id=eq.'+S.eid,{method:'PATCH',body:JSON.stringify(o)});
      else await sb('clothing_items',{method:'POST',body:JSON.stringify(o)});
    }else if(t==='cc'){
      const name=document.getElementById('f_cn').value.trim(),id=document.getElementById('f_cid').value.trim();
      if(!name||!id){alert('请填写名称和 ID');return}
      await sb('clothing_cats',{method:'POST',body:JSON.stringify({id,name,icon:document.getElementById('f_ci2').value.trim()||'🏷️',sort_order:D.cats.length+1})});
    }
    toast('保存成功');cMo('uMo');await loadAll();
  }catch(e){console.error(e);toast('保存失败: '+e.message)}
}

// ===== DELETE =====
async function dl(table,id){
  if(!isAdmin()||!confirm('确定删除？'))return;
  try{await sb(table+'?id=eq.'+id,{method:'DELETE'});toast('已删除');await loadAll()}catch(e){toast('删除失败')}
}
async function dlCI(id){
  if(!isAdmin()||!confirm('确定删除？'))return;
  try{await sb('clothing_items?id=eq.'+id,{method:'DELETE'});S.sel.delete(id);toast('已删除');await loadAll()}catch(e){toast('删除失败')}
}

// ===== DETAIL =====
function dP(id){
  const p=D.p.find(i=>i.id===id);if(!p)return;
  document.getElementById('dMb').innerHTML=`<h2>${esc(p.title)}</h2>
    ${p.img?`<img src="${esc(p.img)}" style="width:100%;max-height:260px;object-fit:contain;border-radius:8px;background:var(--mf);margin-bottom:10px" onclick="slb('${esc(p.img)}')">`:''}
    <div class="di">📅 ${(p.created_at||'').slice(0,10)}　🔧 ${esc(p.model||'')}</div>
    <div class="cd-tg" style="margin:8px 0">${(p.tags||[]).map(t=>`<span class="cd-tgi">${esc(t)}</span>`).join('')}</div>
    <label style="font-size:.77rem;color:var(--tm)">Prompt</label><div class="dp">${esc(p.prompt)}</div>
    ${p.negative?`<label style="font-size:.77rem;color:var(--tm)">Negative</label><div class="dp" style="border-left:3px solid var(--mb)">${esc(p.negative)}</div>`:''}
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="cpb" onclick="cpx(${JSON.stringify(p.prompt)});this.textContent='已复制 ✓';setTimeout(()=>this.textContent='复制 Prompt',1200)">复制 Prompt</button>
      <button class="bc" onclick="cMo('dMo')">关闭</button></div>`;
  oMo('dMo');
}
function dA(id){
  const a=D.a.find(i=>i.id===id);if(!a)return;
  const mc=['mb0','mb1','mb2','mb3'];
  const imgs=(a.images||[]).map(u=>`<img src="${esc(u)}" onclick="event.stopPropagation();slb('${esc(u)}')" onerror="this.style.display='none'">`).join('');
  document.getElementById('dMb').innerHTML=`<h2>${esc(a.name)}</h2>
    <div class="di">📅 ${(a.created_at||'').slice(0,10)}</div>
    <div class="cd-tg" style="margin:8px 0">${(a.tags||[]).map(t=>`<span class="cd-tgi">${esc(t)}</span>`).join('')}</div>
    <label style="font-size:.77rem;color:var(--tm)">画师串</label><div class="dp">${esc(a.string)}</div>
    ${imgs?`<label style="font-size:.77rem;color:var(--tm)">画风展示</label><div class="ad-imgs">${imgs}</div>`:''}
    ${(a.models||[]).length?`<div style="margin:10px 0"><div style="font-size:.82rem;color:var(--ts);margin-bottom:6px;font-weight:500">模型表现对比</div>${a.models.map((m,i)=>`<div style="margin:5px 0;padding:8px;background:var(--bg);border-radius:7px;border:1px solid var(--bd)"><span class="mbdg ${mc[i%4]}">${esc(m.name)}</span><span style="font-size:.82rem;color:var(--ts)">${esc(m.notes)}</span></div>`).join('')}</div>`:''}
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="cpb" onclick="cpx(${JSON.stringify(a.string)});this.textContent='已复制 ✓';setTimeout(()=>this.textContent='复制画师串',1200)">复制画师串</button>
      <button class="bc" onclick="cMo('dMo')">关闭</button></div>`;
  oMo('dMo');
}

// ===== INIT =====
if(sessionStorage.getItem('yg_admin'))S.admin=true;
updAdmin();
loadAll();
document.getElementById('pS').addEventListener('input',R);
document.getElementById('aS').addEventListener('input',R);
document.getElementById('cS').addEventListener('input',rC);
</script>
</body>
</html>
